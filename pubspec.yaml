name: sign_speak_ai
description: Sign Speak AI - real-time on-device sign language translation and learning.

publish_to: 'none'

version: 1.0.0+1

environment:
  sdk: '>=3.0.0 <4.0.0'

dependencies:
  flutter:
    sdk: flutter
  camera: ^0.11.4
  flutter_riverpod: ^2.6.1
  flutter_tts: ^4.2.2
  hand_landmarker: ^2.2.0
  shared_preferences: ^2.3.5

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^3.0.0

flutter:
  uses-material-design: true
  assets:
    - assets/sign_images/
    - assets/sign_quiz_images/
